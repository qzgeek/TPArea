name: TPArea
version: 1.0.0
main: net.qzgeek.tparea.TPAreaPlugin
api-version: "1.21"
folia-supported: true
description: 传送区域插件 — 进入区域时替换快捷栏为传送菜单

commands:
  tparea:
    description: 传送区域管理命令
    usage: /<command> <子命令>
    permission: tparea.admin

permissions:
  tparea.admin:
    default: op
    description: 传送区域管理权限
